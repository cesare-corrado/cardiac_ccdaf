name: CI

# Tier-1 continuous integration: fast, CPU-only checks on every push and pull
# request to the integration branches. All 135 unit tests are synthetic and
# headless — they run pure geometry/IO on the CPU and never open a render
# window — so no GPU and no display are needed. The future real-Carto-data
# regressions (docs/eam-real-data-verification.md) are Tier-2 and belong on a
# local/self-hosted runner with the private data; see the nightly plan.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:   # allow manual runs from the Actions tab

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff — defect gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff check
        run: ruff check .

  test:
    name: Unit tests (CPU, conda)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}   # login shell so conda activation takes effect
    steps:
      - uses: actions/checkout@v4
      - name: Create the ccdaf environment from environment.yml
        # conda-forge's vtk pulls its own libGL / mesa, so the runner needs no
        # apt-get; and building from environment.yml gives CI the validated
        # stack (VTK 9.6, pyvista 0.48) rather than a pip approximation.
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest    # conda-forge channel + fast solver
          environment-file: environment.yml
          activate-environment: ccdaf
      - name: Environment summary
        run: conda list
      - name: Run unit tests (headless, CPU)
        env:
          QT_QPA_PLATFORM: offscreen   # belt-and-braces; no test opens a window
        run: pytest tests/unit -v
