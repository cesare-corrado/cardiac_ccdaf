name: ccdaf
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - numpy>=1.23
  - scipy>=1.10
  - vtk>=9.2
  - pyvista>=0.43
  - pyvistaqt>=0.11
  - pyqt>=5.15
  - matplotlib>=3.7
  - simpleitk>=2.4
  - trimesh>=4.0
  # trimesh.fix_normals() needs networkx (an optional extra of trimesh);
  # decimate raises ModuleNotFoundError without it.
  - networkx>=3.0
  - pytest>=7.0
  - pip
  - pip:
    - -e .

variables:
  # conda-forge's vtk/pyqt combo can crash inside libfontconfig when the
  # shared ~/.cache/fontconfig directory holds cache files written by other
  # fontconfig versions (system fontconfig, other conda envs). Isolate this
  # env's font cache to avoid cross-version corruption.
  XDG_CACHE_HOME: ~/.cache/ccdaf-fontconfig
